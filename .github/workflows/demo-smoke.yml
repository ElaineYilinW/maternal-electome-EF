name: demo

# Smoke test that `git clone -> pip install -e . -> run examples/demo.ipynb`
# actually works on a fresh machine, across the OS / Python matrix.
#
# The portable `.pt` format (see scripts/convert_models_to_portable.py)
# decoupled the loader from torch's pickle internals, so we can test on
# Python 3.9 ... 3.13 and all three runners. If this matrix is green,
# any reader of the GitHub repo can run the demo on any modern setup.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  demo:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.11', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Editable install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Resolved versions
        shell: python
        run: |
            import sys, torch, numpy
            print(f"python = {sys.version.split()[0]}")
            print(f"torch  = {torch.__version__}")
            print(f"numpy  = {numpy.__version__}")

      - name: Smoke-test loader from a directory outside the repo
        shell: python
        run: |
            from electome.models_registry import list_ef_models, load_ef_model
            for name in list_ef_models():
                m = load_ef_model(name)
                print(f"{name}: dim_in={m.dim_in}, h={m.h}")

      - name: Execute examples/demo.ipynb
        run: |
          jupyter nbconvert --to notebook --execute examples/demo.ipynb --output demo.ipynb
          python -c "import json; nb=json.load(open('examples/demo.ipynb')); n_err=sum(1 for c in nb['cells'] if c['cell_type']=='code' for o in c.get('outputs',[]) if o.get('output_type')=='error'); n_png=sum(1 for c in nb['cells'] if c['cell_type']=='code' for o in c.get('outputs',[]) if 'image/png' in o.get('data',{})); print(f'errors: {n_err} figures: {n_png}'); assert n_err==0 and n_png==6"

      - name: Upload the failing notebook for inspection
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: demo-${{ matrix.os }}-py${{ matrix.python-version }}
          path: examples/demo.ipynb
          if-no-files-found: ignore
