name: demo

# Smoke test that `git clone -> pip install -e . -> run examples/demo.ipynb`
# actually works on a fresh machine, across the OS / Python matrix.
#
# The portable `.pt` format (see scripts/convert_models_to_portable.py)
# decoupled the loader from torch's pickle internals, so we can test on
# Python 3.9 ... 3.13 and all three runners. If this matrix is green,
# any reader of the GitHub repo can run the demo on any modern setup.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  demo:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Editable install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Register the venv as the "electome" Jupyter kernel
        # The demo notebook pins kernel name to "electome" so it auto-selects
        # the right Python instead of any pre-existing system kernel. CI
        # mirrors the README's user steps.
        run: python -m ipykernel install --user --name electome --display-name "Python (electome)"

      - name: Resolved versions
        shell: python
        run: |
            import sys, torch, numpy
            print(f"python = {sys.version.split()[0]}")
            print(f"torch  = {torch.__version__}")
            print(f"numpy  = {numpy.__version__}")

      - name: Smoke-test loader from a directory outside the repo
        shell: python
        run: |
            from electome.models_registry import list_ef_models, load_ef_model
            for name in list_ef_models():
                m = load_ef_model(name)
                print(f"{name}: dim_in={m.dim_in}, h={m.h}")

      - name: Execute examples/demo.ipynb
        shell: bash
        run: |
          # Capture nbconvert exit code WITHOUT failing the step yet, so the
          # post-mortem below has a chance to extract any cell traceback.
          set +e
          jupyter nbconvert --to notebook --execute examples/demo.ipynb --output demo.ipynb
          NBCONVERT_RC=$?
          set -e

          python <<'PY'
          import json, os, re, sys
          ansi = re.compile(r'\x1b\[[0-9;]*m')
          try:
              nb = json.load(open('examples/demo.ipynb'))
          except Exception as e:
              # If nbconvert never wrote a notebook (early failure), emit a
              # generic annotation so the API surfaces *something* readable.
              msg = f"failed to read demo.ipynb after nbconvert: {e}"
              msg = msg.replace('%', '%25').replace('\n', '%0A')
              print(f"::error title=nbconvert produced no output::{msg}")
              sys.exit(1)

          n_err = 0
          n_png = 0
          for ci, c in enumerate(nb['cells']):
              if c.get('cell_type') != 'code':
                  continue
              for o in c.get('outputs', []):
                  if o.get('output_type') == 'error':
                      n_err += 1
                      tb = '\n'.join(ansi.sub('', line) for line in o.get('traceback', []))
                      head = f"{o.get('ename','?')}: {o.get('evalue','?')}"
                      body = (head + "\n\n" + tb)[-3000:]
                      body = body.replace('%', '%25').replace('\n', '%0A').replace('\r', '%0D')
                      print(f"::error file=examples/demo.ipynb,title=cell {ci} {o.get('ename','error')}::{body}")
                  if 'image/png' in o.get('data', {}):
                      n_png += 1
          print(f"errors: {n_err}  figures: {n_png}  nbconvert_rc: {os.environ.get('NBCONVERT_RC','?')}")
          if n_err != 0 or n_png != 6:
              sys.exit(1)
          PY

      - name: Upload the failing notebook for inspection
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: demo-${{ matrix.os }}-py${{ matrix.python-version }}
          path: examples/demo.ipynb
          if-no-files-found: ignore
